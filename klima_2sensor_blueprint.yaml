blueprint:
  name: Klima – 2-Sensor-Mittelwert-Regelung (Heizen/Kühlen + Lamellen)
  description: 'Generischer Klon der Esszimmer-Steuerung (Bosch). Regelt einen Raum
    auf eine Zieltemperatur anhand des Mittelwerts zweier Temperatursensoren (optional
    eines vorhandenen Mittelwert-Sensors). Steuert Heizen/Kühlen inkl. Lüfter und
    vertikaler/horizontaler Lamellen-Position. Stellt nur bei echtem Zustandswechsel
    um und meldet diesen per HA-Mitteilung mit allen Werten. Mindestlaufzeit + Hysterese
    als Schutz gegen Pendeln.

    Pro Raum nur die Entitäten auswählen – Schwellen und Geräte-Rohwerte haben Defaults
    (passend zum Bosch im Esszimmer) und müssen nur bei abweichenden Geräten angepasst
    werden.


    Sendet nur noch Befehle, die vom aktuellen Gerätezustand abweichen (weniger
    Piepsen). Lüfterstufen stark/leise optional per input_select-Helfer vom
    Dashboard steuerbar.'
  domain: automation
  input:
    klima_entity:
      name: Klimagerät
      description: Die climate-Entität.
      selector:
        entity:
          filter:
          - domain:
            - climate
          multiple: false
          reorder: false
    sensor_1:
      name: Temperatursensor 1
      description: Erster Raumsensor (z. B. Esstisch).
      selector:
        entity:
          filter:
          - domain:
            - sensor
            device_class:
            - temperature
          multiple: false
          reorder: false
    sensor_2:
      name: Temperatursensor 2
      description: Zweiter Raumsensor (z. B. Couch).
      selector:
        entity:
          filter:
          - domain:
            - sensor
            device_class:
            - temperature
          multiple: false
          reorder: false
    sel_vertikal:
      name: Lamellen vertikal (select)
      description: select-Entität für die vertikale Lamellen-Position.
      selector:
        entity:
          filter:
          - domain:
            - select
          multiple: false
          reorder: false
    sel_horizontal:
      name: Lamellen horizontal (select)
      description: select-Entität für die horizontale Lamellen-Position.
      selector:
        entity:
          filter:
          - domain:
            - select
          multiple: false
          reorder: false
    sensor_mittelwert:
      name: Mittelwert-Sensor (optional)
      description: Vorhandener Mittelwert-Sensor. Wenn gesetzt, hat er Vorrang; sonst
        wird der Mittelwert aus Sensor 1 und Sensor 2 berechnet.
      default:
      selector:
        entity:
          filter:
          - domain:
            - sensor
            device_class:
            - temperature
          multiple: false
          reorder: false
    ziel_temp:
      name: Zieltemperatur Heizen (°C)
      description: Sollwert, der beim Heizen an das Gerät gesendet wird (climate.set_temperature).
        Steuert NICHT, wann die Automation schaltet – das machen die Ein-/Aus-Schwellen.
      default: 23
      selector:
        number:
          min: 16.0
          max: 28.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    ziel_temp_kuehlen:
      name: Zieltemperatur Kühlen (°C)
      description: Sollwert, der beim Kühlen an das Gerät gesendet wird. Niedriger
        = das Gerät kühlt kräftiger durch (drosselt nicht schon an der Aus-Schwelle).
        Wie kalt der Raum WIRKLICH wird, bestimmt aber „Kühlen beenden bei", nicht
        dieser Wert.
      default: 20
      selector:
        number:
          min: 16.0
          max: 26.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    ziel_temp_helper:
      name: Wunschtemperatur-Helfer (optional)
      description: 'Optionaler input_number-Helfer für die Wunschtemperatur, per
        Dashboard-Slider jederzeit verstellbar. Wenn er UND der Toleranz-Band-Helfer
        gesetzt sind, gelten: Kühlen ein ab Wunsch + Band, Kühlen aus bei Wunsch,
        starke Stufe ein über Wunsch + Band + 1, starke Stufe aus unter Wunsch +
        Band. Die festen Schwellen unten dienen dann nur noch als Ersatzwerte,
        falls ein Helfer keinen gültigen Wert liefert. Feld leeren = feste Werte.'
      default: ''
      selector:
        entity:
          filter:
          - domain:
            - input_number
          multiple: false
          reorder: false
    band_oben_helper:
      name: Toleranz-Band-Helfer (optional)
      description: 'Optionaler input_number-Helfer für das Toleranz-Band – also wie
        viel Grad über der Wunschtemperatur das Kühlen startet. Nur wirksam, wenn
        auch der Wunschtemperatur-Helfer gesetzt ist. Feld leeren = feste Werte.'
      default: ''
      selector:
        entity:
          filter:
          - domain:
            - input_number
          multiple: false
          reorder: false
    kuehlen_ein:
      name: Kühlen einschalten ab (°C)
      default: 25
      selector:
        number:
          min: 20.0
          max: 32.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    kuehlen_aus:
      name: Kühlen beenden bei (°C, Hysterese)
      default: 23
      selector:
        number:
          min: 18.0
          max: 28.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    heizen_ein:
      name: Heizen einschalten unter (°C)
      default: 21.5
      selector:
        number:
          min: 10.0
          max: 24.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    heizen_aus:
      name: Heizen beenden bei (°C, Hysterese)
      default: 23
      selector:
        number:
          min: 16.0
          max: 26.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    kuehlen_stark_ueber:
      name: 'Kühlen: starke Stufe ein über (°C)'
      default: 28
      selector:
        number:
          min: 22.0
          max: 35.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    kuehlen_stark_aus:
      name: 'Kühlen: starke Stufe aus unter (°C, Hysterese)'
      description: Untere Schwelle der starken Kühlstufe. Liegt der Mittelwert zwischen
        dieser Schwelle und „starke Stufe ein über", bleibt die aktuell laufende Stufe
        erhalten (Totband gegen Pendeln stark↔leise). Muss unter „starke Stufe ein
        über" liegen.
      default: 26
      selector:
        number:
          min: 20.0
          max: 34.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    heizen_swing_unter:
      name: 'Heizen: Swing-Lamellen unter (°C)'
      default: 21
      selector:
        number:
          min: 10.0
          max: 24.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    min_laufzeit:
      name: Mindestlaufzeit vor Moduswechsel (Min)
      default: 30
      selector:
        number:
          min: 0.0
          max: 120.0
          step: 5.0
          unit_of_measurement: min
          mode: slider
    fan_stark:
      name: 'Lüftermodus: stark (Rohwert)'
      default: medium
      selector:
        select:
          options:
          - auto
          - diffuse
          - low
          - medium
          - high
          multiple: false
          sort: false
          custom_value: false
    fan_leise:
      name: 'Lüftermodus: leise (Rohwert)'
      default: diffuse
      selector:
        select:
          options:
          - auto
          - diffuse
          - low
          - medium
          - high
          multiple: false
          sort: false
          custom_value: false
    fan_stark_helper:
      name: 'Lüftermodus stark: Helfer (optional)'
      description: 'Optionaler input_select-Helfer für die starke Lüfterstufe, per
        Dashboard verstellbar. Die Optionen des Helfers müssen Geräte-Rohwerte sein
        (z. B. auto, diffuse, low, medium, high). Wenn gesetzt und gültig, hat er
        Vorrang vor dem festen Wert oben. Feld leeren = fester Wert.'
      default: ''
      selector:
        entity:
          filter:
          - domain:
            - input_select
          multiple: false
          reorder: false
    fan_leise_helper:
      name: 'Lüftermodus leise: Helfer (optional)'
      description: 'Optionaler input_select-Helfer für die leise Lüfterstufe, per
        Dashboard verstellbar. Optionen = Geräte-Rohwerte. Wenn gesetzt und gültig,
        hat er Vorrang vor dem festen Wert oben. Feld leeren = fester Wert.'
      default: ''
      selector:
        entity:
          filter:
          - domain:
            - input_select
          multiple: false
          reorder: false
    pos_heizen:
      name: 'Lamelle vertikal: Heizen normal (Rohwert)'
      default: angle5
      selector:
        text:
          multiple: false
          multiline: false
    pos_kuehlen:
      name: 'Lamelle vertikal: Kühlen (Rohwert)'
      default: angle1
      selector:
        text:
          multiple: false
          multiline: false
    pos_swing:
      name: 'Lamelle vertikal: Swing (Rohwert)'
      default: swing
      selector:
        text:
          multiple: false
          multiline: false
    pos_horizontal:
      name: Lamelle horizontal (Rohwert)
      default: left
      selector:
        select:
          options:
          - left
          - center
          - right
          multiple: false
          sort: false
          custom_value: false
    debug_notification:
      name: Debug-Benachrichtigung
      description: Aktiviert eine persistent_notification bei jedem Lauf – auch wenn
        keine Aktion nötig ist. Nur zum Debuggen einschalten (erzeugt viele Meldungen).
      default: false
      selector:
        boolean: {}
  source_url: https://github.com/burnagent/openrepo/blob/main/klima_2sensor_blueprint.yaml
variables:
  clima: !input klima_entity
  s1: !input sensor_1
  s2: !input sensor_2
  sel_vertikal: !input sel_vertikal
  sel_horizontal: !input sel_horizontal
  avg_entity: !input sensor_mittelwert
  ziel_temp: !input ziel_temp
  ziel_temp_kuehlen: !input ziel_temp_kuehlen
  ziel_helper: !input ziel_temp_helper
  band_o_helper: !input band_oben_helper
  wunsch: "{{ states(ziel_helper) | float(none)\n   if ziel_helper not in [none,
    '', 'none'] else none }}"
  band_o: "{{ states(band_o_helper) | float(none)\n   if band_o_helper not in [none,
    '', 'none'] else none }}"
  helper_aktiv: '{{ wunsch is not none and band_o is not none }}'
  kuehlen_ein_fest: !input kuehlen_ein
  kuehlen_aus_fest: !input kuehlen_aus
  kuehlen_stark_ueber_fest: !input kuehlen_stark_ueber
  kuehlen_stark_aus_fest: !input kuehlen_stark_aus
  kuehlen_ein: '{{ (wunsch + band_o) if helper_aktiv else kuehlen_ein_fest }}'
  kuehlen_aus: '{{ wunsch if helper_aktiv else kuehlen_aus_fest }}'
  kuehlen_stark_ueber: '{{ (wunsch + band_o + 1) if helper_aktiv else kuehlen_stark_ueber_fest }}'
  kuehlen_stark_aus: '{{ (wunsch + band_o) if helper_aktiv else kuehlen_stark_aus_fest }}'
  heizen_ein: !input heizen_ein
  heizen_aus: !input heizen_aus
  heizen_swing_unter: !input heizen_swing_unter
  min_laufzeit: !input min_laufzeit
  fan_stark_fest: !input fan_stark
  fan_leise_fest: !input fan_leise
  fan_stark_helper: !input fan_stark_helper
  fan_leise_helper: !input fan_leise_helper
  fan_stark: "{{ states(fan_stark_helper)\n   if (fan_stark_helper not in [none,
    '', 'none']\n       and states(fan_stark_helper) not in ['unknown', 'unavailable',
    ''])\n   else fan_stark_fest }}"
  fan_leise: "{{ states(fan_leise_helper)\n   if (fan_leise_helper not in [none,
    '', 'none']\n       and states(fan_leise_helper) not in ['unknown', 'unavailable',
    ''])\n   else fan_leise_fest }}"
  pos_heizen: !input pos_heizen
  pos_kuehlen: !input pos_kuehlen
  pos_swing: !input pos_swing
  pos_horizontal: !input pos_horizontal
  ht1: '{{ states(s1) | float(none) }}'
  ht2: '{{ states(s2) | float(none) }}'
  avg_sensor: "{{ states(avg_entity) | float(none)\n   if (avg_entity not in [none,
    '', 'none']) else none }}"
  raum: "{{ avg_sensor if avg_sensor is not none\n   else ((([ht1, ht2] | reject('none')
    | list | sum)\n          / ([ht1, ht2] | reject('none') | list | length))\n         if
    ([ht1, ht2] | reject('none') | list | length) > 0 else none) }}"
  valid: '{{ raum is not none }}'
  hvac: '{{ states(clima) }}'
  is_heating: '{{ hvac == ''heat'' }}'
  is_cooling: '{{ hvac == ''cool'' }}'
  last_chg: '{{ states[clima].last_changed if states[clima] is not none else now()
    }}'
  run_min: '{{ (now() - as_datetime(last_chg)).total_seconds() / 60 }}'
  min_runtime_ok: '{{ run_min >= min_laufzeit }}'
  locked: '{{ (is_heating or is_cooling) and not min_runtime_ok }}'
  cool_needed: '{{ valid and raum >= kuehlen_ein }}'
  cool_done: '{{ valid and raum <= kuehlen_aus }}'
  heat_needed: '{{ valid and raum < heizen_ein }}'
  heat_done: '{{ valid and raum >= heizen_aus }}'
  want_cool: '{{ cool_needed or (is_cooling and not cool_done) }}'
  want_heat: '{{ heat_needed or (is_heating and not heat_done) }}'
  ist: "{{\n  'aus' if hvac == 'off' else\n  (('heizen_swing' if states(sel_vertikal)
    == pos_swing else 'heizen_normal')\n    if hvac == 'heat' else\n  (('kuehlen_low'
    if (fan_stark != fan_leise and state_attr(clima, 'fan_mode') == fan_stark)
    else 'kuehlen_diffuse')\n    if hvac == 'cool' else hvac))\n}}"
  cool_stark: "{{ valid and (raum > kuehlen_stark_ueber\n   or (ist == 'kuehlen_low'
    and raum > kuehlen_stark_aus)) }}"
  ziel: "{{\n  'skip' if not valid else\n  (('kuehlen_low' if cool_stark else 'kuehlen_diffuse')\n
    \   if (want_cool and not (locked and is_heating)) else\n  (('heizen_swing' if
    raum < heizen_swing_unter else 'heizen_normal')\n    if (want_heat and not (locked
    and is_cooling)) else\n  ('aus' if (((is_heating or is_cooling) and min_runtime_ok)
    or hvac == 'off')\n    else 'halten')))\n}}"
  d_mode: "{{ 'cool' if ziel in ['kuehlen_low','kuehlen_diffuse']\n   else ('heat'
    if ziel in ['heizen_normal','heizen_swing'] else 'off') }}"
  d_temp: '{{ ziel_temp_kuehlen if d_mode == ''cool'' else ziel_temp }}'
  d_fan: '{{ fan_stark if ziel == ''kuehlen_low'' else fan_leise }}'
  d_vert: "{{ pos_swing if ziel == 'heizen_swing'\n   else (pos_heizen if ziel ==
    'heizen_normal' else pos_kuehlen) }}"
  need_mode: '{{ hvac != d_mode }}'
  need_temp: "{{ need_mode or (state_attr(clima, 'temperature') | float(-99))\n
    \  != (d_temp | float) }}"
  need_fan: '{{ need_mode or state_attr(clima, ''fan_mode'') != d_fan }}'
  need_vert: '{{ need_mode or states(sel_vertikal) != d_vert }}'
  need_hor: '{{ need_mode or states(sel_horizontal) != pos_horizontal }}'
  act: "{{ ziel not in ['skip', 'halten'] and ziel != ist\n   and (ziel == 'aus'
    or need_mode or need_temp or need_fan or need_vert or need_hor) }}"
  gesendet: "{{ (['Modus ' ~ d_mode] if need_mode else [])\n   + (['Solltemp ' ~
    d_temp] if need_temp else [])\n   + (['Lüfter ' ~ d_fan] if need_fan else [])\n
    \  + (['Lamelle V ' ~ d_vert] if need_vert else [])\n   + (['Lamelle H ' ~ pos_horizontal]
    if need_hor else []) }}"
  name1: '{{ state_attr(s1,''friendly_name'') or ''Sensor 1'' }}'
  name2: '{{ state_attr(s2,''friendly_name'') or ''Sensor 2'' }}'
  txt_ist: "{{ {'aus':'Aus','heizen_normal':'Heizen - normal','heizen_swing':'Heizen
    - Swing',\n    'kuehlen_low':'Kühlen - stark','kuehlen_diffuse':'Kühlen - leise'}.get(ist,
    ist) }}"
  txt_ziel: "{{ {'aus':'Aus','heizen_normal':'Heizen - normal','heizen_swing':'Heizen
    - Swing',\n    'kuehlen_low':'Kühlen - stark','kuehlen_diffuse':'Kühlen - leise'}.get(ziel,
    ziel) }}"
  debug: !input debug_notification
triggers:
- trigger: state
  entity_id: !input sensor_1
  id: sensor1_change
- trigger: state
  entity_id: !input sensor_2
  id: sensor2_change
- trigger: homeassistant
  event: start
  id: ha_start
- trigger: time_pattern
  minutes: /5
  id: periodisch
conditions: []
actions:
- choose:
  - conditions:
    - condition: template
      value_template: '{{ not act }}'
    sequence: []
  default:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ ziel == ''aus'' }}'
      sequence:
      - action: climate.turn_off
        target:
          entity_id: '{{ clima }}'
    default:
    - if:
      - condition: template
        value_template: '{{ need_mode }}'
      then:
      - action: climate.set_hvac_mode
        target:
          entity_id: '{{ clima }}'
        data:
          hvac_mode: '{{ d_mode }}'
    - if:
      - condition: template
        value_template: '{{ need_temp }}'
      then:
      - action: climate.set_temperature
        target:
          entity_id: '{{ clima }}'
        data:
          temperature: '{{ d_temp }}'
    - if:
      - condition: template
        value_template: '{{ need_fan }}'
      then:
      - action: climate.set_fan_mode
        continue_on_error: true
        target:
          entity_id: '{{ clima }}'
        data:
          fan_mode: '{{ d_fan }}'
    - if:
      - condition: template
        value_template: '{{ need_vert }}'
      then:
      - action: select.select_option
        continue_on_error: true
        target:
          entity_id: '{{ sel_vertikal }}'
        data:
          option: '{{ d_vert }}'
    - if:
      - condition: template
        value_template: '{{ need_hor }}'
      then:
      - action: select.select_option
        continue_on_error: true
        target:
          entity_id: '{{ sel_horizontal }}'
        data:
          option: '{{ pos_horizontal }}'
  - action: persistent_notification.create
    data:
      notification_id: klima_{{ clima | replace('.','_') }}_{{ now().timestamp() |
        int }}
      title: Klima {{ state_attr(clima,'friendly_name') or clima }}
      message: '{{ now().strftime(''%d.%m. %H:%M'') }} · Umstellung von "{{ txt_ist
        }}" auf "{{ txt_ziel }}" — Mittelwert {{ (raum | round(1) | string).replace(''.'',
        '','') }} °C ({{ name1 }} {{ (ht1 | round(1) | string).replace(''.'', '','')
        if ht1 is not none else ''—'' }} · {{ name2 }} {{ (ht2 | round(1) | string).replace(''.'',
        '','') if ht2 is not none else ''—'' }}) · gesendet: {{ ''Aus-Befehl'' if
        ziel == ''aus'' else (gesendet | join('', '') if gesendet | length > 0 else
        ''nichts'') }}'
- if:
  - condition: template
    value_template: '{{ debug and not act }}'
  then:
  - action: persistent_notification.create
    data:
      notification_id: klima_debug_{{ clima | replace('.','_') }}
      title: "\U0001F50D Debug {{ state_attr(clima,'friendly_name') or clima }}"
      message: '{{ now().strftime(''%d.%m. %H:%M'') }} · kein Schaltbefehl — raum
        {{ (raum | round(1) | string).replace(''.'','','') }} °C · ziel: {{ ziel }}
        · locked: {{ locked }} · act: {{ act }}'
mode: single
max_exceeded: silent
# rev 2026-07-13: nur abweichende Befehle senden + Lüfter-Helfer
