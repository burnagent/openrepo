blueprint:
  name: Samsung WindFree – Raumtemperatur halten (Zieltemperatur, Totband & Stoßlüften konfigurierbar)
  description: >-
    Hält die Raumtemperatur im einstellbaren Zeitfenster (Standard 08:00–21:00)
    auf der wählbaren Zieltemperatur (Standard 23 °C). Das Totband ist getrennt
    nach oben und unten einstellbar (Default je 1 °C → Band 22–24 °C bei Ziel
    23 °C): unterhalb (Ziel − Band unten) wird geheizt, oberhalb (Ziel + Band
    oben) gekühlt. Das Zeitfenster lässt sich per Schalter auch ganz
    deaktivieren (dann rund um die Uhr aktiv). Kühlen: wählbarer Preset
    (Standard WindFree mit Lüfter Auto). Heizen: Lüfter low. Schaltet ab, wenn
    die Temperatur 15 Min im oberen Totband stabil ist, sowie zur eingestellten
    Stopp-Zeit. Prüft alle 5 Minuten (zusätzlich ereignisgesteuert) und schreibt
    bei JEDER Prüfung im aktiven Fenster eine Mitteilung mit aktuellem Stand UND
    Begründung, warum gerade etwas gemacht wird – oder bewusst nicht.
    Optionales Stoßlüften (per Setting ein-/ausschaltbar): Liegt die
    Außentemperatur über der einstellbaren Schwelle (Standard 24 °C), wird im
    aktiven Zeitfenster alle 15 Minuten 40 s lang fan_only + Boost geschaltet
    und danach wieder ausgeschaltet.
    Das Stoßlüften erzeugt bewusst KEINE Mitteilung (sonst Meldungsflut).
    Generischer Klon von Charlys Steuerung – pro Raum nur die climate-Entität
    auswählen (Charly, Henry, Schlafzimmer, Büro …).
  domain: automation
  input:
    klima_entity:
      name: Klimagerät
      description: Die climate-Entität des Samsung-WindFree-Geräts.
      selector:
        entity:
          filter:
            - domain: climate
    aussen_entity:
      name: Außentemperatur-Sensor (optional)
      description: >-
        Sensor der Außentemperatur. Wird für die Stoßlüftung benötigt (muss
        zusätzlich über „Stoßlüften aktiv" eingeschaltet sein). Vorbelegt mit
        dem Helper „Aussentemperatur Met.no". Feld leeren = kein Außensensor.
      default: sensor.aussentemperatur_met_no
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
    zeitfenster_aktiv:
      name: Zeitfenster aktiv
      description: >-
        Wenn aktiviert (Standard), steuert die Automation nur innerhalb des
        unten eingestellten Zeitfensters und schaltet zur Stopp-Zeit ab.
        Deaktiviert = rund um die Uhr aktiv, keine Zeitabschaltung.
      default: true
      selector:
        boolean: {}
    start_zeit:
      name: Startzeit (Fensterbeginn)
      description: >-
        Ab dieser Uhrzeit wird gesteuert – nur wirksam, wenn „Zeitfenster aktiv"
        eingeschaltet ist.
      default: "08:00:00"
      selector:
        time: {}
    stop_zeit:
      name: Stoppzeit (Fensterende / Abschaltung)
      description: >-
        Zu dieser Uhrzeit wird abgeschaltet, danach wird bis zur nächsten
        Startzeit nicht mehr gesteuert – nur wirksam, wenn „Zeitfenster aktiv"
        eingeschaltet ist.
      default: "21:00:00"
      selector:
        time: {}
    preset_kuehlen:
      name: Kühl-Preset
      description: >-
        Welcher Samsung-Preset beim Kühlen verwendet und gehalten wird. In allen
        Fällen läuft der Lüfter auf „auto" – alle Presets nutzen auto, deshalb
        wird auto beim Kühlen immer mitgesetzt und gehalten. „none" bedeutet
        keinen Sondermodus und muss vom Gerät unterstützt werden.
      default: wind_free
      selector:
        select:
          options:
            - wind_free
            - quiet
            - motion_indirect
            - none
    ziel_temp:
      name: Zieltemperatur
      description: >-
        Wunsch-Raumtemperatur, auf die geheizt/gekühlt wird. Das Totband ergibt
        sich aus den Einstellungen „Band oben" und „Band unten": unterhalb
        (Ziel − Band unten) → Heizen, oberhalb (Ziel + Band oben) → Kühlen.
        Beispiel: Ziel 23 °C, Band je 1 °C → Bereich 22–24 °C.
      default: 23
      selector:
        number:
          min: 16
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: box
    band_oben:
      name: Band oben (Kühlen ab)
      description: >-
        Grad über der Zieltemperatur, ab der gekühlt wird. Beispiel: Ziel 23 °C
        + Band oben 1 °C → Kühlen ab 24 °C.
      default: 1
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5
          unit_of_measurement: "°C"
          mode: box
    band_unten:
      name: Band unten (Heizen ab)
      description: >-
        Grad unter der Zieltemperatur, ab der geheizt wird. Beispiel: Ziel 23 °C
        − Band unten 1 °C → Heizen unter 22 °C.
      default: 1
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5
          unit_of_measurement: "°C"
          mode: box
    stosslueften_aktiv:
      name: Stoßlüften aktiv
      description: >-
        Wenn aktiviert, wird bei Außentemperatur über der eingestellten Schwelle
        alle 15 Minuten 40 Sekunden lang fan_only + Boost geschaltet (nur bei
        ausgeschaltetem Gerät und vorhandenem Außensensor). Deaktiviert = kein
        Stoßlüften.
      default: true
      selector:
        boolean: {}
    stosslueften_temp:
      name: Stoßlüften – Außentemperatur-Schwelle
      description: >-
        Ab dieser Außentemperatur wird Stoßlüften ausgelöst (nur wenn
        „Stoßlüften aktiv" eingeschaltet ist). Standard 24 °C.
      default: 24
      selector:
        number:
          min: 10
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: box

# Inputs in Triggern nur über trigger_variables nutzbar (für die
# temperaturabhängigen Template-Trigger, die das Totband mitführen).
trigger_variables:
  klima_tv: !input klima_entity
  ziel_tv: !input ziel_temp
  band_o_tv: !input band_oben
  band_u_tv: !input band_unten

variables:
  klima: !input klima_entity
  aussen_id: !input aussen_entity
  fenster_aktiv: !input zeitfenster_aktiv
  start_str: !input start_zeit
  stop_str: !input stop_zeit
  preset_soll: !input preset_kuehlen
  ziel_temp: !input ziel_temp
  band_o: !input band_oben
  band_u: !input band_unten
  stosslueften: !input stosslueften_aktiv
  stoss_temp: !input stosslueften_temp
  grenze_unten: "{{ ziel_temp - band_u }}"
  grenze_oben: "{{ ziel_temp + band_o }}"
  stable_unten: "{{ ziel_temp - (band_u / 2) }}"
  stable_oben: "{{ ziel_temp + band_o }}"
  ziel_str: "{{ ('%g' % ziel_temp).replace('.', ',') }}"
  unten_str: "{{ ('%g' % grenze_unten).replace('.', ',') }}"
  oben_str: "{{ ('%g' % grenze_oben).replace('.', ',') }}"
  stable_unten_str: "{{ ('%g' % stable_unten).replace('.', ',') }}"
  stable_oben_str: "{{ ('%g' % stable_oben).replace('.', ',') }}"
  trig: "{{ trigger.id | default('manual') }}"
  temp: "{{ state_attr(klima,'current_temperature') | float(none) }}"
  mode: "{{ states(klima) }}"
  fan: "{{ state_attr(klima,'fan_mode') }}"
  preset: "{{ state_attr(klima,'preset_mode') }}"
  preset_ist: >-
    {{ 'none' if (preset is none or preset | string in ['none','None','']) else preset }}
  aussen: >-
    {{ states(aussen_id) | float(none) if aussen_id not in [none, ''] else none }}
  jetzt_hms: "{{ now().strftime('%H:%M:%S') }}"
  in_window: >-
    {{ (not fenster_aktiv) or
       ((start_str <= jetzt_hms < stop_str) if start_str <= stop_str
        else (jetzt_hms >= start_str or jetzt_hms < stop_str)) }}
  temp_str: >-
    {{ (temp | round(1) | string).replace('.', ',') if temp is not none else '—' }}
  aussen_str: >-
    {{ (aussen | round(1) | string).replace('.', ',') if aussen is not none else '—' }}
  ziel: >-
    {{ ('off_zeit' if (trig == 't_offtime' and fenster_aktiv)
        else ('aus_zeitfenster' if not in_window
        else ('durchlueften' if (trig == 't_purge' and stosslueften and aussen is not none and aussen > stoss_temp and mode == 'off')
        else ('purge_aus' if trig == 't_purge'
        else ('kein_wert' if temp is none
        else ('off_stabil' if (trig == 't_stable' and mode != 'off')
        else ('heizen' if (temp < grenze_unten and mode != 'heat')
        else ('kuehlen' if (temp > grenze_oben and mode != 'cool')
        else ('kuehl_preset' if (mode == 'cool' and ((preset_ist != preset_soll) or (fan != 'auto')))
        else 'halten'))))))))) }}
  did_act: >-
    {{ ziel in ['off_zeit','off_stabil','heizen','kuehlen','kuehl_preset','durchlueften'] }}
  notify: "{{ did_act and ziel != 'durchlueften' }}"
  status: >-
    Modus {{ {'off':'Aus','cool':'Kühlen','heat':'Heizen'}.get(mode, mode)
    }}{% if mode == 'cool' %} (Lüfter {{ fan }}, Preset {{ preset }}){% elif mode == 'heat' %} (Lüfter {{ fan }}){% endif %} · aktuell {{ temp_str }} °C
  grund: >-
    {{ {
      'off_zeit': 'Zeitfenster-Ende ' ~ stop_str[:5] ~ ' Uhr → Anlage aus',
      'off_stabil': stable_unten_str ~ '–' ~ stable_oben_str ~ ' °C seit 15 Min stabil → Anlage aus',
      'heizen': 'Raum < ' ~ unten_str ~ ' °C → Heizen, Lüfter low, Ziel ' ~ ziel_str ~ ' °C',
      'kuehlen': 'Raum > ' ~ oben_str ~ ' °C → Kühlen Preset ' ~ preset_soll ~ ' (Lüfter Auto), Ziel ' ~ ziel_str ~ ' °C',
      'kuehl_preset': 'Kühlen aktiv → Preset ' ~ preset_soll ~ ' + Lüfter Auto wiederhergestellt',
      'durchlueften': 'Gerät aus & außen ' ~ aussen_str ~ ' °C (> ' ~ ('%g' % stoss_temp).replace('.', ',') ~ ') → 40 s Stoßlüften (fan_only + Boost), dann aus',
      'purge_aus': 'Stoßlüft-Intervall übersprungen (deaktiviert, außen ' ~ aussen_str ~ ' °C ≤ ' ~ ('%g' % stoss_temp).replace('.', ',') ~ ', kein Sensor, oder Gerät kühlt/heizt → Kühlen/Heizen hat Vorrang)',
      'halten': 'im Zielbereich (' ~ unten_str ~ '–' ~ oben_str ~ ' °C) bzw. kein Moduswechsel nötig → keine Änderung',
      'aus_zeitfenster': 'außerhalb Zeitfenster (' ~ start_str[:5] ~ '–' ~ stop_str[:5] ~ ' Uhr) → keine Steuerung',
      'kein_wert': 'keine aktuelle Temperatur verfügbar → keine Steuerung'
    }.get(ziel, ziel) }}

triggers:
  # Temperaturschwellen folgen dem konfigurierbaren Totband (band_o/band_u)
  # bzw. dem Stabil-Band – daher Template- statt numeric_state-Trigger,
  # die ziel_tv/band_*_tv aus trigger_variables nutzen.
  - trigger: template
    value_template: >-
      {% set t = state_attr(klima_tv,'current_temperature') | float(none) %}
      {{ t is not none and t > (ziel_tv + band_o_tv) }}
    for:
      minutes: 5
    id: t_warm
  - trigger: template
    value_template: >-
      {% set t = state_attr(klima_tv,'current_temperature') | float(none) %}
      {{ t is not none and t < (ziel_tv - band_u_tv) }}
    for:
      minutes: 5
    id: t_cold
  - trigger: template
    value_template: >-
      {% set t = state_attr(klima_tv,'current_temperature') | float(none) %}
      {{ t is not none and t > (ziel_tv - (band_u_tv / 2)) and t < (ziel_tv + band_o_tv) }}
    for:
      minutes: 15
    id: t_stable
  - trigger: time_pattern
    minutes: /5
    id: t_check
  - trigger: time_pattern
    minutes: "2"
    id: t_purge
  - trigger: time_pattern
    minutes: "17"
    id: t_purge
  - trigger: time_pattern
    minutes: "32"
    id: t_purge
  - trigger: time_pattern
    minutes: "47"
    id: t_purge
  - trigger: time
    at: !input stop_zeit
    id: t_offtime

conditions: []

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'durchlueften' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: fan_only
          - action: climate.set_preset_mode
            target:
              entity_id: !input klima_entity
            data:
              preset_mode: boost
          - delay:
              seconds: 40
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: "off"
      - conditions:
          - condition: template
            value_template: "{{ ziel in ['off_zeit','off_stabil'] }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: "off"
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'heizen' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: heat
          - action: climate.set_fan_mode
            target:
              entity_id: !input klima_entity
            data:
              fan_mode: low
          - action: climate.set_temperature
            target:
              entity_id: !input klima_entity
            data:
              temperature: !input ziel_temp
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'kuehlen' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: cool
          - action: climate.set_temperature
            target:
              entity_id: !input klima_entity
            data:
              temperature: !input ziel_temp
          # Lüfter immer auto (alle Presets laufen mit auto), dann Preset setzen.
          - action: climate.set_fan_mode
            target:
              entity_id: !input klima_entity
            data:
              fan_mode: auto
          - action: climate.set_preset_mode
            target:
              entity_id: !input klima_entity
            data:
              preset_mode: !input preset_kuehlen
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'kuehl_preset' }}"
        sequence:
          - action: climate.set_fan_mode
            target:
              entity_id: !input klima_entity
            data:
              fan_mode: auto
          - action: climate.set_preset_mode
            target:
              entity_id: !input klima_entity
            data:
              preset_mode: !input preset_kuehlen
    default: []
  - if:
      - condition: template
        value_template: "{{ notify }}"
    then:
      - action: persistent_notification.create
        data:
          notification_id: "klima_{{ klima | replace('.','_') }}_{{ now().timestamp() | int }}"
          title: "Klima {{ state_attr(klima,'friendly_name') or klima }}"
          message: >-
            {{ now().strftime('%d.%m. %H:%M') }} · {{ grund }} — vorher: {{ status }}

mode: single
max_exceeded: silent
