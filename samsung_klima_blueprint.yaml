blueprint:
  name: Samsung WindFree – Raumtemperatur halten (20–24 °C, 8–20 Uhr)
  description: >-
    Hält die Raumtemperatur tagsüber (08:00–20:00) zwischen 20 und 24 °C,
    Zieltemperatur 22 °C. Kühlen: ausschließlich WindFree mit Lüfter Auto.
    Heizen: Lüfter low, wenn unter 20 °C. Schaltet ab, wenn 21–23 °C 15 Min
    stabil sind, sowie um 20:00 Uhr.
    Prüft alle 5 Minuten (zusätzlich ereignisgesteuert) und schreibt bei JEDER
    Prüfung im aktiven Fenster eine Mitteilung mit aktuellem Stand UND
    Begründung, warum gerade etwas gemacht wird – oder bewusst nicht.
    Zusätzliches Stoßlüften: Liegt die Außentemperatur über 24 °C, wird im
    Zeitfenster (08–20 Uhr) alle 30 Minuten 20 s lang fan_only + Boost
    geschaltet und danach wieder ausgeschaltet (optionaler Außensensor-Input).
    Generischer Klon von Charlys Steuerung – pro Raum nur die climate-Entität
    auswählen (Charly, Henry, Schlafzimmer, Büro …).
  domain: automation
  input:
    klima_entity:
      name: Klimagerät
      description: Die climate-Entität des Samsung-WindFree-Geräts.
      selector:
        entity:
          filter:
            - domain: climate
    aussen_entity:
      name: Außentemperatur-Sensor (optional)
      description: >-
        Sensor der Außentemperatur. Nur nötig für die Stoßlüftung: Wenn die
        Außentemperatur über 24 °C liegt, wird im Zeitfenster (08–20 Uhr) alle
        30 Minuten 20 Sekunden lang fan_only + Boost geschaltet und danach
        wieder ausgeschaltet. Bleibt das Feld leer, ist die Stoßlüftung
        deaktiviert.
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature

variables:
  klima: !input klima_entity
  aussen_id: !input aussen_entity
  trig: "{{ trigger.id | default('manual') }}"
  temp: "{{ state_attr(klima,'current_temperature') | float(none) }}"
  mode: "{{ states(klima) }}"
  fan: "{{ state_attr(klima,'fan_mode') }}"
  preset: "{{ state_attr(klima,'preset_mode') }}"
  aussen: >-
    {{ states(aussen_id) | float(none) if aussen_id not in [none, ''] else none }}
  in_window: "{{ 8 <= now().hour < 20 }}"
  temp_str: >-
    {{ (temp | round(1) | string).replace('.', ',') if temp is not none else '—' }}
  aussen_str: >-
    {{ (aussen | round(1) | string).replace('.', ',') if aussen is not none else '—' }}
  ziel: >-
    {{ ('off_zeit' if trig == 't_offtime'
        else ('aus_zeitfenster' if not in_window
        else ('durchlueften' if (trig == 't_purge' and aussen is not none and aussen > 24 and mode == 'off')
        else ('purge_aus' if trig == 't_purge'
        else ('kein_wert' if temp is none
        else ('off_stabil' if (trig == 't_stable' and mode != 'off')
        else ('heizen' if (temp < 20 and mode != 'heat')
        else ('kuehlen' if (temp > 24 and mode != 'cool')
        else ('kuehl_windfree' if (mode == 'cool' and (preset != 'wind_free' or fan != 'auto'))
        else 'halten'))))))))) }}
  did_act: >-
    {{ ziel in ['off_zeit','off_stabil','heizen','kuehlen','kuehl_windfree','durchlueften'] }}
  notify: "{{ did_act }}"
  status: >-
    Modus {{ {'off':'Aus','cool':'Kühlen','heat':'Heizen'}.get(mode, mode)
    }}{% if mode == 'cool' %} (Lüfter {{ fan }}, Preset {{ preset }}){% elif mode == 'heat' %} (Lüfter {{ fan }}){% endif %} · aktuell {{ temp_str }} °C
  grund: >-
    {{ {
      'off_zeit': 'Zeitfenster-Ende 20:00 Uhr → Anlage aus',
      'off_stabil': '21–23 °C seit 15 Min stabil → Anlage aus',
      'heizen': 'Raum < 20 °C → Heizen, Lüfter low, Ziel 22 °C',
      'kuehlen': 'Raum > 24 °C → Kühlen WindFree (Lüfter Auto), Ziel 22 °C',
      'kuehl_windfree': 'Kühlen aktiv → WindFree + Lüfter Auto wiederhergestellt',
      'durchlueften': 'Gerät aus & außen ' ~ aussen_str ~ ' °C (> 24) → 20 s Stoßlüften (fan_only + Boost), dann aus',
      'purge_aus': 'Stoßlüft-Intervall übersprungen (außen ' ~ aussen_str ~ ' °C ≤ 24, kein Sensor, oder Gerät kühlt/heizt → Kühlen/Heizen hat Vorrang)',
      'halten': 'im Zielbereich (20–24 °C) bzw. kein Moduswechsel nötig → keine Änderung',
      'aus_zeitfenster': 'außerhalb Zeitfenster (08–20 Uhr) → keine Steuerung',
      'kein_wert': 'keine aktuelle Temperatur verfügbar → keine Steuerung'
    }.get(ziel, ziel) }}

triggers:
  - trigger: numeric_state
    entity_id: !input klima_entity
    attribute: current_temperature
    above: 24
    for:
      minutes: 5
    id: t_warm
  - trigger: numeric_state
    entity_id: !input klima_entity
    attribute: current_temperature
    below: 20
    for:
      minutes: 5
    id: t_cold
  - trigger: numeric_state
    entity_id: !input klima_entity
    attribute: current_temperature
    above: 21
    below: 23
    for:
      minutes: 15
    id: t_stable
  - trigger: time_pattern
    minutes: /5
    id: t_check
  - trigger: time_pattern
    minutes: "2,32"
    id: t_purge
  - trigger: time
    at: "20:00:00"
    id: t_offtime

conditions: []

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'durchlueften' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: fan_only
          - action: climate.set_preset_mode
            target:
              entity_id: !input klima_entity
            data:
              preset_mode: boost
          - delay:
              seconds: 20
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: "off"
      - conditions:
          - condition: template
            value_template: "{{ ziel in ['off_zeit','off_stabil'] }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: "off"
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'heizen' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: heat
          - action: climate.set_fan_mode
            target:
              entity_id: !input klima_entity
            data:
              fan_mode: low
          - action: climate.set_temperature
            target:
              entity_id: !input klima_entity
            data:
              temperature: 22
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'kuehlen' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input klima_entity
            data:
              hvac_mode: cool
          - action: climate.set_temperature
            target:
              entity_id: !input klima_entity
            data:
              temperature: 22
          - action: climate.set_fan_mode
            target:
              entity_id: !input klima_entity
            data:
              fan_mode: auto
          - action: climate.set_preset_mode
            target:
              entity_id: !input klima_entity
            data:
              preset_mode: wind_free
      - conditions:
          - condition: template
            value_template: "{{ ziel == 'kuehl_windfree' }}"
        sequence:
          - action: climate.set_fan_mode
            target:
              entity_id: !input klima_entity
            data:
              fan_mode: auto
          - action: climate.set_preset_mode
            target:
              entity_id: !input klima_entity
            data:
              preset_mode: wind_free
    default: []
  - if:
      - condition: template
        value_template: "{{ notify }}"
    then:
      - action: persistent_notification.create
        data:
          notification_id: "klima_{{ klima | replace('.','_') }}_{{ now().timestamp() | int }}"
          title: "Klima {{ state_attr(klima,'friendly_name') or klima }}"
          message: >-
            {{ now().strftime('%d.%m. %H:%M') }} · {{ grund }} — vorher: {{ status }}

mode: single
max_exceeded: silent
